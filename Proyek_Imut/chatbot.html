<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ElektroBot AI — Chat Eksklusif</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Markdown & Math Rendering Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        /* Force dark theme for better SaaS aesthetic on this page */
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --bg3: #334155;
            --bg4: #020617;
            --text: #f8fafc;
            --text2: #94a3b8;
            --text3: #64748b;
            --line: rgba(255,255,255,0.1);
            --line2: rgba(255,255,255,0.05);
            --accent: #4f9cf9;
        }
    </style>
</head>
<body class="chat-page-body">
    <header class="chat-header">
        <div class="chat-title-wrap">
            <div class="chat-logo">⚡</div>
            <div class="chat-h-info">
                <div class="chat-h-name">ElektroBot AI</div>
                <div class="chat-h-status"><span>●</span> Online & Ready</div>
            </div>
            <!-- Model Selector -->
            <select id="modelSelector" class="model-selector">
                <option value="llama-3.3-70b-versatile">Llama 3.3 (Versatile)</option>
                <option value="gpt-oss-120b">GPT-OSS (120B)</option>
                <option value="llama-3.2-11b-vision-preview">Vision (Expert)</option>
            </select>
        </div>
        <a href="index" class="chat-back">
            <span>←</span> Dashboard
        </a>
    </header>

    <main class="chat-history" id="chatHistory">
        <!-- AI Welcome Message -->
        <div class="chat-bubble chat-bubble-ai">
            Halo! Saya **ElektroBot**, asisten AI Engineer ahli teknik elektro Anda. Saya sekarang punya "mata" dan bisa bantu jelasin skema atau foto komponen Sobat. Ada yang bisa saya bantu? ⚡
        </div>
    </main>

    <!-- Image/File Preview Bar -->
    <div id="imagePreviewBar" class="image-preview-bar" style="display: none;">
        <div class="preview-container" id="previewContainer">
            <img id="previewImg" src="" alt="Preview" style="display:none;">
            <div id="fileInfo" class="file-info" style="display:none;">
                <span class="file-icon">📄</span>
                <span id="fileName" class="file-name">document.pdf</span>
            </div>
            <button class="remove-img-btn" onclick="clearImage()">×</button>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrap">
            <input type="file" id="imageInput" accept="image/*, .pdf, .doc, .docx, .txt" style="display: none;" onchange="handleImageSelect(this)">
            <button class="chat-tool-btn" onclick="document.getElementById('imageInput').click()" title="Unggah Gambar/Dokumen">
                <!-- Paperclip Icon -->
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/>
                </svg>
            </button>
            <input type="text" id="chatInput" placeholder="Tanya soal sirkuit, komponen, atau teori..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                <svg id="sendIcon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                <div id="sendSpinner" class="chat-spinner" style="display: none;"></div>
            </button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
      // Smooth Navigation for Clean URLs
      document.querySelectorAll('a[href^="index"]').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          document.body.classList.add('fade-out');
          setTimeout(() => {
            window.location.href = link.href;
          }, 250);
        });
      });
    </script>
</body>
</html>
