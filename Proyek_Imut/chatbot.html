<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ElektroBot AI — Chat Eksklusif</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Markdown & Math Rendering Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        /* Force dark theme for better SaaS aesthetic on this page */
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --bg3: #334155;
            --bg4: #020617;
            --text: #f8fafc;
            --text2: #94a3b8;
            --text3: #64748b;
            --line: rgba(255,255,255,0.1);
            --line2: rgba(255,255,255,0.05);
            --accent: #4f9cf9;
        }
    </style>
</head>
<body class="chat-page-body">
    <header class="chat-header">
        <div class="chat-title-wrap">
            <div class="chat-logo">⚡</div>
            <div class="chat-h-info">
                <div class="chat-h-name">ElektroBot AI</div>
                <div class="chat-h-status"><span>●</span> Online & Ready</div>
            </div>
        </div>
        <div class="chat-model-switcher-header">
            <select id="modelSelector" class="model-selector-header">
                <option value="qwen/qwen-2.5-72b-instruct:free" selected>Qwen 2.5 (Gratis)</option>
                <option value="meta-llama/llama-3.3-70b-versatile">Llama 3.3 (Cepat)</option>
                <option value="openai/gpt-4o">GPT-4 (Ultra Pinter)</option>
            </select>
        </div>
        <div class="chat-header-actions">
            <button class="chat-action-btn" title="Export PDF" onclick="exportToPDF()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
            </button>
            <button class="chat-action-btn" title="Clear Chat" onclick="confirmClearHistory()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </div>
        <a href="index" class="chat-back">
            <span>←</span> Dashboard
        </a>
    </header>

    <main class="chat-history" id="chatHistory">
        <!-- AI Welcome Message -->
        <div class="chat-bubble chat-bubble-ai">
            Halo! Saya **ElektroBot**, asisten AI Engineer ahli teknik elektro Anda. Saya sekarang punya "mata" dan bisa bantu jelasin skema atau foto komponen Sobat. Ada yang bisa saya bantu? ⚡
        </div>
    </main>

    <!-- Image/File Preview Bar -->
    <div id="imagePreviewBar" class="image-preview-bar" style="display: none;">
        <div class="preview-container" id="previewContainer">
            <img id="previewImg" src="" alt="Preview" style="display:none;">
            <div id="fileInfo" class="file-info" style="display:none;">
                <span class="file-icon">📄</span>
                <span id="fileName" class="file-name">document.pdf</span>
            </div>
            <button class="remove-img-btn" onclick="clearImage()">×</button>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrap">
            <input type="file" id="imageInput" accept="image/*, .pdf, .doc, .docx, .txt" style="display: none;" onchange="handleImageSelect(this)">
            <button class="chat-add-btn" onclick="document.getElementById('imageInput').click()" title="Unggah Gambar/Dokumen">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <textarea id="chatInput" placeholder="Tanya soal sirkuit, komponen, atau teori..." rows="1"></textarea>
            <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                <svg id="sendIcon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
                <div id="sendSpinner" class="chat-spinner" style="display: none;"></div>
            </button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
      // Smooth Navigation for Clean URLs
      document.querySelectorAll('a[href^="index"]').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          document.body.classList.add('fade-out');
          setTimeout(() => {
            window.location.href = link.href;
          }, 250);
        });
      });
    </script>
</body>
</html>
