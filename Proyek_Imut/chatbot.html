<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ElektroBot AI — Chat Eksklusif</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Markdown & Math Rendering Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        /* Modern Theme System for Chatbot (Light Default, B&W Dark) */
        :root {
            --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9; --bg4: #e2e8f0; --bg5: #fdfdfd;
            --line: rgba(0,0,0,0.06); --line2: rgba(0,0,0,0.1);
            --text: #0f172a; --text2: #475569; --text3: #94a3b8;
            --accent: #2563eb;
        }

        body.dark {
            --bg: #000000; --bg2: #0a0a0a; --bg3: #111111; --bg4: #000000;
            --text: #ffffff; --text2: #a0a0a0; --text3: #606060;
            --line: #222222; --line2: #151515; --accent: #ffffff;
        }

        body.chat-page-body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Plus Jakarta Sans', sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .chat-header {
            background: var(--bg);
            border-bottom: 1px solid var(--line);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap; /* Allow wrapping on mobile */
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .chat-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-model-switcher-header {
            flex: 1;
            min-width: 140px; /* Ensure visibility */
        }

        .model-selector-header {
            width: 100%;
            padding: 6px 10px;
            background: var(--bg3);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .chat-header {
                padding: 10px 15px;
                gap: 8px;
            }
            .chat-title-wrap {
                width: 100%;
                justify-content: space-between;
                margin-bottom: 4px;
            }
            .chat-model-switcher-header {
                width: 100%;
                order: 3; /* Move below on mobile */
            }
            .chat-header-actions {
                order: 2;
            }
            .chat-history {
                height: calc(100vh - 180px); /* Adjust for larger header */
            }
        }

        .chat-bubble-ai {
            background: var(--bg2);
            border: 1px solid var(--line);
            color: var(--text);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .chat-bubble-user {
            background: var(--bg3);
            border: 1px solid var(--line);
            color: var(--text);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            font-size: 14px;
            margin-left: auto;
            max-width: 85%;
        }
    </style>
</head>
<body class="chat-page-body">
    <header class="chat-header">
        <div class="chat-title-wrap">
            <div class="chat-logo" style="color:#fff">⚡</div>
            <div class="chat-h-info">
                <div class="chat-h-name">ElektroBot AI</div>
                <div class="chat-h-status"><span style="color:#22c55e">●</span> <span class="u-hide-mobile">Online</span></div>
            </div>
        </div>
        <div class="chat-model-switcher-header">
            <select id="modelSelector" class="model-selector-header">
                <option value="llama-3.3-70b-versatile" selected>Llama 3.3 (Cepat & Stabil)</option>
                <option value="openai/gpt-oss-120b">GPT-OSS (Logika Elektro Tingkat Tinggi)</option>
            </select>
        </div>
        <div class="chat-header-actions">
            <button class="chat-action-btn" title="Export PDF" onclick="exportToPDF()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
            </button>
            <button class="chat-action-btn" title="Clear Chat" onclick="confirmClearHistory()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </div>
        <a href="index" class="chat-back" style="color:var(--text2)">
            <span>←</span> <span class="u-hide-mobile">Dashboard</span>
        </a>
    </header>

    <main class="chat-history" id="chatHistory">
        <!-- AI Welcome Message -->
        <div class="chat-bubble chat-bubble-ai">
            Halo! Saya **ElektroBot**, asisten AI Engineer ahli teknik elektro Anda. Saya sekarang punya "mata" dan bisa bantu jelasin skema atau foto komponen Sobat. Ada yang bisa saya bantu? ⚡
        </div>
    </main>

    <!-- Image/File Preview Bar -->
    <div id="imagePreviewBar" class="image-preview-bar" style="display: none;">
        <div class="preview-container" id="previewContainer">
            <img id="previewImg" src="" alt="Preview" style="display:none;">
            <div id="fileInfo" class="file-info" style="display:none;">
                <span class="file-icon">📄</span>
                <span id="fileName" class="file-name">document.pdf</span>
            </div>
            <button class="remove-img-btn" onclick="clearImage()">×</button>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrap">
            <input type="file" id="imageInput" accept="image/*, .pdf, .doc, .docx, .txt" style="display: none;" onchange="handleImageSelect(this)">
            <button class="chat-add-btn" onclick="document.getElementById('imageInput').click()" title="Unggah Gambar/Dokumen">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <textarea id="chatInput" placeholder="Tanya soal sirkuit, komponen, atau teori..." rows="1"></textarea>
            <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                <svg id="sendIcon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
                <div id="sendSpinner" class="chat-spinner" style="display: none;"></div>
            </button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
      // Theme Logic for Standalone Chatbot
      function initTheme() {
        const saved = localStorage.getItem('theme') || 'light';
        if (saved === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
      }
      initTheme();

      // Smooth Navigation for Clean URLs
      document.querySelectorAll('a[href^="index"]').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          document.body.classList.add('fade-out');
          setTimeout(() => {
            window.location.href = link.href;
          }, 250);
        });
      });
    </script>
</body>
</html>
