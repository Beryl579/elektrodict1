<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ElektroBot AI — Chat Eksklusif</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Markdown & Math Rendering Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        /* Modern Monochrome Dark Theme (ChatGPT/Gemini Style) */
        :root {
            --bg: #000000;
            --bg2: #0a0a0a;
            --bg3: #111111;
            --bg4: #000000;
            --text: #ffffff;
            --text2: #a0a0a0;
            --text3: #606060;
            --line: #222222;
            --line2: #151515;
            --accent: #ffffff;
            --accent-glow: rgba(255,255,255,0.1);
        }

        body.chat-page-body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Plus Jakarta Sans', sans-serif;
        }

        .chat-header {
            background: rgba(0,0,0,0.8);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
            padding: 12px 24px;
        }

        .chat-bubble-ai {
            background: var(--bg2);
            border: 1px solid var(--line);
            color: var(--text);
            border-radius: 12px;
            box-shadow: none;
        }

        .chat-bubble-user {
            background: #2563eb; /* Slightly blue but kept professional, or #fff for pure B&W */
            color: #fff;
            border-radius: 12px;
        }
        
        /* User's request for pure B&W */
        .chat-bubble-user {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
        }

        .chat-input-wrap {
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .chat-add-btn, .chat-send-btn {
            color: var(--text2);
        }

        .chat-add-btn:hover, .chat-send-btn:hover {
            color: var(--text);
        }

        .model-selector-header {
            background: var(--bg3);
            border-color: var(--line);
            color: var(--text1);
        }
        
        /* Marked rendering override for B&W */
        .code-block-wrapper {
            border: 1px solid var(--line);
            background: #050505;
        }
    </style>
</head>
<body class="chat-page-body">
    <header class="chat-header">
        <div class="chat-title-wrap">
            <div class="chat-logo" style="color:#fff">⚡</div>
            <div class="chat-h-info">
                <div class="chat-h-name">ElektroBot AI</div>
                <div class="chat-h-status"><span style="color:#22c55e">●</span> <span class="u-hide-mobile">Online</span></div>
            </div>
        </div>
        <div class="chat-model-switcher-header">
            <select id="modelSelector" class="model-selector-header">
                <option value="llama-3.3-70b-versatile" selected>Llama 3.3 (High Speed)</option>
                <option value="llama-3.2-11b-vision-preview">Llama Vision (Pro)</option>
            </select>
        </div>
        <div class="chat-header-actions">
            <button class="chat-action-btn" title="Export PDF" onclick="exportToPDF()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
            </button>
            <button class="chat-action-btn" title="Clear Chat" onclick="confirmClearHistory()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </div>
        <a href="index" class="chat-back" style="color:var(--text2)">
            <span>←</span> <span class="u-hide-mobile">Dashboard</span>
        </a>
    </header>

    <main class="chat-history" id="chatHistory">
        <!-- AI Welcome Message -->
        <div class="chat-bubble chat-bubble-ai">
            Halo! Saya **ElektroBot**, asisten AI Engineer ahli teknik elektro Anda. Saya sekarang punya "mata" dan bisa bantu jelasin skema atau foto komponen Sobat. Ada yang bisa saya bantu? ⚡
        </div>
    </main>

    <!-- Image/File Preview Bar -->
    <div id="imagePreviewBar" class="image-preview-bar" style="display: none;">
        <div class="preview-container" id="previewContainer">
            <img id="previewImg" src="" alt="Preview" style="display:none;">
            <div id="fileInfo" class="file-info" style="display:none;">
                <span class="file-icon">📄</span>
                <span id="fileName" class="file-name">document.pdf</span>
            </div>
            <button class="remove-img-btn" onclick="clearImage()">×</button>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrap">
            <input type="file" id="imageInput" accept="image/*, .pdf, .doc, .docx, .txt" style="display: none;" onchange="handleImageSelect(this)">
            <button class="chat-add-btn" onclick="document.getElementById('imageInput').click()" title="Unggah Gambar/Dokumen">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <textarea id="chatInput" placeholder="Tanya soal sirkuit, komponen, atau teori..." rows="1"></textarea>
            <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                <svg id="sendIcon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
                <div id="sendSpinner" class="chat-spinner" style="display: none;"></div>
            </button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
      // Smooth Navigation for Clean URLs
      document.querySelectorAll('a[href^="index"]').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          document.body.classList.add('fade-out');
          setTimeout(() => {
            window.location.href = link.href;
          }, 250);
        });
      });
    </script>
</body>
</html>
